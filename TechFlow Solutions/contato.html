<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>TechFlow Solutions</title>
</head>

<body>
    <header>
        <div class="logo">
            <h1>TechFlow Solutions</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="cadastro.html">Cadastro</a></li>
                <li><a href="usuarios.html">Usuários</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contato">
            <h2>Entre em contato</h2>
            <p>Preencha o formulário abaixo para falar com a equipe.</p>

            <form>
                <label for="nome">Nome:</label>
                <input id="nome" type="text" placeholder="Digite seu nome..." required>

                <label for="email">E-mail:</label>
                <input id="email" type="email" placeholder="Digite seu e-mail...">

                <label for="assunto">Assunto:</label>
                <input id="assunto" type="text" placeholder="Digite o assunto..." required>

                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" rows="6" maxlength="500" placeholder="Digite sua mensagem..."></textarea>

                <button type="submit">Enviar Mensagem</button>
            </form>

        </section>

    </main>
    <footer class="footer center">
        <p>&copy; 2026 TechFlow Solutions</p>

    </footer>
</body>
