<html>
    <head>
        <title>Aprendendo html: Atividade 1</title>
    </head>

    <body>

        <!-- CABEÇALHO DA PÁGINA -->
        <header>
            <h1>Contato</h1>

        </header>

        <hr> <!-- linha horizontal separando conteúdo -->
        <nav>
                <ul>
                    <li><a href="home.html">Início</a></li>
                    <li><a href="cadastro.html">Cadastro</a></li>
                    <li><a href="contato.html">Contato</a></li>
                </ul>
        </nav>

        <hr>
        <!-- SEÇÃO DE CONTEÚDO -->
        <main>

            <!-- FORMULÁRIO -->
            <section>
                <form>

                    <!-- Nome -->
                    <label>Nome:</label>
                    <input 
                        type="text"
                        id="nome"
                        maxlength="30"
                        minlength="2"
                        placeholder="Informe seu nome..."
                        required
                    />

                    <br>

                    <!-- Email -->
                     <label>E-mail: </label>
                    <input type="email" placeholder="Digite seu email..." />

                    <br>
                    <!-- Telefone -->
                     <label>Telefone: </label>
                    <input type="tel" placeholder="Digite seu telefone..." />
                    <br>
                    <label>Mensagem:</label>
                    <textarea placeholder="Digite sua mensagem aqui..."></textarea>
                    <br>
                    <br>
                    <!-- BOTÃO -->
                    <button type="submit">Enviar Mensagem</button>

                </form>
            </section>

        </main>

        <hr>

        <!-- RODAPÉ -->
        <footer>
            <p>Desenvolvido por Lucas para aula de HTML</p>
        </footer>

    </body>
</html>
